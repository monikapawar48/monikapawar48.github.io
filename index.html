<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monika Pawar</title>
  <link rel="icon" type="image/svg+xml" href="Favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:wght@300..800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F4F3F2;
      --text: #292727;
      --link: #292727;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Funnel Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    p.bio {
      font-size: clamp(1.25rem, 2.6vw, 1.6rem);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: -0.04em;
      color: var(--text);
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 3rem;
      justify-content: center;
    }

    .links a {
      font-size: 1rem;
      font-weight: 300;
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 3px;
      letter-spacing: -0.04em;
      transition: opacity 0.2s ease;
    }

    .links a:hover {
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="bio">Monika Pawar is a designer based in Chicago. She currently works at Stripe, bringing events and experiences to life around the globe.</p>
    <div class="links">
      <a href="mailto:monikapawar48@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/monika-pawar-39592a78/" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </div>
</body>
</html>
